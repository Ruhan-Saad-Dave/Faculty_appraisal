# Production Deployment Configuration for GCP
services:
  server:
    build:
      context: .
    ports:
      - 80:8000
    env_file:
      - .env
    restart: always
    # Cloud Run or GCE will manage scaling/execution
    # These environment variables are usually injected by the CI/CD pipeline
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
